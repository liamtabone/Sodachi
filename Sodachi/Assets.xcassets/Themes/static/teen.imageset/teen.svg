<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Arms angled down (moody teen) -->
  <ellipse cx="18" cy="65" rx="10" ry="5.5" fill="#4CAF50" stroke="#388E3C" stroke-width="2" transform="rotate(25 18 65)"/>
  <ellipse cx="82" cy="65" rx="10" ry="5.5" fill="#4CAF50" stroke="#388E3C" stroke-width="2" transform="rotate(-25 82 65)"/>
  <!-- Body — slightly taller oval -->
  <ellipse cx="50" cy="57" rx="27" ry="32" fill="#4CAF50" stroke="#388E3C" stroke-width="2.5"/>
  <!-- Half-lidded eyes -->
  <circle cx="42" cy="49" r="5.5" fill="#2C2C2C"/>
  <circle cx="58" cy="49" r="5.5" fill="#2C2C2C"/>
  <circle cx="44" cy="47" r="2" fill="white"/>
  <circle cx="60" cy="47" r="2" fill="white"/>
  <!-- Half-lids -->
  <path d="M 36.5 47 Q 42 43.5 47.5 47" stroke="#388E3C" stroke-width="2" fill="none"/>
  <path d="M 52.5 47 Q 58 43.5 63.5 47" stroke="#388E3C" stroke-width="2" fill="none"/>
  <!-- Smirk -->
  <path d="M 44 62 Q 52 67 58 63" stroke="#2C2C2C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
