<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Arms raised (confident) -->
  <ellipse cx="16" cy="52" rx="11" ry="6" fill="#FF9800" stroke="#E65100" stroke-width="2" transform="rotate(-35 16 52)"/>
  <ellipse cx="84" cy="52" rx="11" ry="6" fill="#FF9800" stroke="#E65100" stroke-width="2" transform="rotate(35 84 52)"/>
  <!-- Body -->
  <ellipse cx="50" cy="57" rx="30" ry="33" fill="#FF9800" stroke="#E65100" stroke-width="2.5"/>
  <!-- Eyes -->
  <circle cx="42" cy="48" r="6" fill="#2C2C2C"/>
  <circle cx="58" cy="48" r="6" fill="#2C2C2C"/>
  <circle cx="44" cy="46" r="2.5" fill="white"/>
  <circle cx="60" cy="46" r="2.5" fill="white"/>
  <!-- Big confident smile -->
  <path d="M 40 62 Q 50 73 60 62" stroke="#2C2C2C" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
